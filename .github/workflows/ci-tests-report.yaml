name: CI testing and CD Report

on:
  push:
    branches: [ "main" ]
  
jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Rodar testes + gerar report
        run: mvn clean verify

      - name: Upload artefato gerado
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/jgiven-reports/html

  deploy:
    needs: test-and-report
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4